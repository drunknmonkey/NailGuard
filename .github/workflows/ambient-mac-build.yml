# Ambient-Glow-Spike: baut die unsignierte macOS-.app/.dmg der Tauri-Hülle
# (Steuerfenster + aufnahme-ausgeschlossenes Overlay). Das Artefakt liegt nach
# dem Lauf unter "Actions -> dieser Run -> Artifacts" zum Download für Paul.
name: Ambient Glow macOS Build

on:
  workflow_dispatch:
  push:
    branches:
      - spike/ambient-glow
    paths:
      - "src-tauri/**"
      - "spike/ambient/**"
      - ".github/workflows/ambient-mac-build.yml"

jobs:
  build:
    # macOS 14 (Sonoma): Mindestziel der App; NSWindowSharingNone wird hier real.
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            src-tauri/target
          key: ${{ runner.os }}-cargo-ambient-${{ hashFiles('src-tauri/Cargo.toml') }}

      - name: Install Tauri CLI
        run: npm install -g @tauri-apps/cli@^2

      - name: Generate app icons
        run: tauri icon icons/icon-512.png

      - name: Build unsigned bundle
        run: tauri build
        env:
          # Unsigniert (Ad-hoc): keine Apple-Signatur/Notarisierung.
          APPLE_SIGNING_IDENTITY: "-"

      - name: Upload bundle
        uses: actions/upload-artifact@v4
        with:
          name: NailGuard-Ambient-Glow-macOS
          if-no-files-found: error
          path: |
            src-tauri/target/release/bundle/dmg/*.dmg
            src-tauri/target/release/bundle/macos/*.app
